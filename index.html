<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bald verfügbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9f9f7;
    }
    .box { text-align: center; padding: 3rem 2rem; }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    .logo .up   { color: #1a1a1a; }
    .logo .lift { color: #5BB8F5; }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 500; color: #1a1a1a; margin-bottom: 0.5rem; }
    p  { font-size: 1rem; color: #666; }
    .contact { margin-top: 2rem; font-size: 0.9rem; color: #666; }
    .contact a { color: #5BB8F5; text-decoration: none; }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <span class="up">UP</span><span class="lift">LIFT^</span>
    </div>
    <div class="icon">🔧</div>
    <h1>Hier entsteht etwas Neues.</h1>
    <p>Wir sind bald für Sie da.</p>
    <p class="contact">
      Kontaktieren Sie uns: <a href="mailto:kontakt@uplift-aufzuege.de">kontakt@uplift-aufzuege.de</a>
    </p>
  </div>
</body>
</html>
